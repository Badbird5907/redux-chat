name: React Doctor

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: millionco/react-doctor@de0795fbeacc1b9992fe2f88140efcd7c4c87d1c
        with:
          version: 0.5.1
