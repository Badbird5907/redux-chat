name: Refresh model catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

concurrency:
  group: models-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup
        uses: ./tooling/github/setup

      - name: Generate model snapshot
        run: pnpm models:generate

      - name: Create pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          branch: chore/models-refresh
          commit-message: "chore(models): refresh models.dev snapshot"
          title: "chore(models): refresh models.dev snapshot"
          body: |
            Automated refresh of the allowlisted models.dev snapshot.

            Generated with:
            - `pnpm models:generate`
          labels: |
            dependencies
            automated
